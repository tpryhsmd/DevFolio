<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:;">
  <title>技術ポートフォリオ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- サイドバー -->
    <aside id="sidebar">
      <div id="sidebar-header">
        <button id="btn-new-page" title="ページ追加">＋ ページ</button>
      </div>
      <div id="tag-filter">
        <div id="tag-filter-header">
          <span id="tag-filter-label">タグで絞り込み</span>
          <button id="btn-manage-tags" title="タグを管理">⚙</button>
        </div>
        <div id="tag-list"></div>
      </div>
      <ul id="page-list"></ul>
    </aside>

    <!-- メインエリア -->
    <main id="main">
      <div id="toolbar">
        <button id="btn-undo" title="元に戻す (Ctrl+Z)" disabled>↩</button>
        <button id="btn-redo" title="やり直す (Ctrl+Y)" disabled>↪</button>
        <span class="toolbar-sep"></span>
        <button id="btn-add-text">＋ 文章</button>
        <button id="btn-add-image">＋ 写真</button>
        <span id="page-title-display"></span>
        <button id="btn-history" title="バージョン履歴">履歴</button>
        <button id="btn-export-html" title="HTMLとして書き出す">書き出し</button>
        <button id="btn-merge-ptf" title=".ptfファイルを取り込む">取り込み</button>
        <button id="btn-save" title="保存 (Ctrl+S)">保存</button>
      </div>
      <div id="canvas">
        <div id="empty-state">
          <p>左のパネルでページを選択するか、「＋ ページ」で新しいページを作成してください。</p>
        </div>
        <div id="page-header" style="display:none;">
          <div id="page-tags-area"></div>
        </div>
        <ul id="block-list"></ul>
      </div>
    </main>
  </div>

  <!-- HTML書き出し対象選択モーダル -->
  <div id="export-modal-overlay" class="modal-overlay" style="display:none;">
    <div class="modal modal-wide">
      <div class="modal-header">
        <h2>書き出すページを選択</h2>
        <button id="export-modal-close" class="modal-close-btn">✕</button>
      </div>
      <div class="modal-body">
        <div style="display:flex;gap:8px;margin-bottom:10px;">
          <button id="export-select-all" style="font-size:12px;padding:4px 10px;">すべて選択</button>
          <button id="export-deselect-all" style="font-size:12px;padding:4px 10px;">すべて解除</button>
        </div>
        <div id="export-page-list" style="max-height:320px;overflow-y:auto;border:1px solid var(--border-default);border-radius:4px;padding:4px 0;"></div>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px;">
          <button id="export-modal-cancel" style="padding:6px 14px;border:1px solid var(--border-default);border-radius:4px;font-size:13px;cursor:pointer;">キャンセル</button>
          <button id="export-modal-ok" style="padding:6px 14px;background:var(--accent);color:var(--text-inverse);border:none;border-radius:4px;font-size:13px;cursor:pointer;">書き出す</button>
        </div>
      </div>
    </div>
  </div>

  <!-- バージョン履歴モーダル -->
  <div id="history-modal-overlay" class="modal-overlay" style="display:none;">
    <div class="modal modal-wide">
      <div class="modal-header">
        <h2>バージョン履歴</h2>
        <button id="history-modal-close" class="modal-close-btn">✕</button>
      </div>
      <div class="modal-body">
        <div class="snapshot-save-row">
          <input id="snapshot-label-input" type="text" placeholder="スナップショット名（任意）" maxlength="50">
          <button id="btn-save-snapshot">スナップショット保存</button>
        </div>
        <div id="snapshot-list"></div>
      </div>
    </div>
  </div>

  <!-- タグ管理モーダル -->
  <div id="modal-overlay" class="modal-overlay" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h2>タグ管理</h2>
        <button id="modal-close" class="modal-close-btn">✕</button>
      </div>
      <div class="modal-body">
        <div id="tag-master-list"></div>
        <div class="tag-add-row">
          <input id="new-tag-input" type="text" placeholder="新しいタグ名" maxlength="30">
          <button id="btn-add-tag">追加</button>
        </div>
      </div>
    </div>
  </div>

  <!-- テキスト入力モーダル（prompt代替） -->
  <div id="input-modal-overlay" class="modal-overlay" style="display:none;">
    <div class="modal" style="width:360px;">
      <div class="modal-header">
        <h2 id="input-modal-title">入力</h2>
        <button id="input-modal-cancel" class="modal-close-btn">✕</button>
      </div>
      <div class="modal-body">
        <div class="tag-add-row" style="padding-top:0;border-top:none;">
          <input id="input-modal-field" type="text" maxlength="100" style="flex:1;">
          <button id="input-modal-ok">OK</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 確認モーダル（confirm代替） -->
  <div id="confirm-modal-overlay" class="modal-overlay" style="display:none;">
    <div class="modal" style="width:360px;">
      <div class="modal-header">
        <h2 id="confirm-modal-title">確認</h2>
      </div>
      <div class="modal-body">
        <p id="confirm-modal-msg" style="font-size:13px;color:var(--text-primary);padding:4px 0 12px;"></p>
        <div style="display:flex;gap:8px;justify-content:flex-end;">
          <button id="confirm-modal-cancel" class="modal-close-btn" style="padding:6px 14px;border:1px solid var(--border-default);border-radius:4px;font-size:13px;">キャンセル</button>
          <button id="confirm-modal-ok" style="padding:6px 14px;background:#c0392b;color:#fff;border:none;border-radius:4px;font-size:13px;cursor:pointer;">削除</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 書き出し完了トースト -->
  <div id="export-toast" class="export-toast" style="display:none;">
    <div class="export-toast-icon">✓</div>
    <div class="export-toast-body">
      <div class="export-toast-title">書き出し完了</div>
      <div class="export-toast-detail" id="export-toast-detail"></div>
    </div>
    <button class="export-toast-open" id="export-toast-open">フォルダを開く</button>
    <button class="export-toast-close" id="export-toast-close">✕</button>
  </div>

  <script src="vendor/purify.min.js"></script>
  <script src="vendor/Sortable.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
